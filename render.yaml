# Render Blueprint — deploy with "New > Blueprint" and connect this repo.
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: prointeractive
    runtime: docker
    region: frankfurt          # closest Render region to Zambia
    plan: free              # always-on: required so payment webhooks never hit a sleeping server
    healthCheckPath: /api/health
    autoDeploy: true           # deploy on every push to main
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true    # Render generates a strong random value for you
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: MONGO_URI
        sync: false            # paste your MongoDB Atlas connection string in the dashboard
      - key: PLATFORM_FEE_PERCENT
        value: "5"
      # --- AWS S3 (image uploads) ---
      - key: AWS_REGION
        value: af-south-1
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: S3_BUCKET
        sync: false
      # --- Flutterwave payments ---
      - key: FLW_SECRET_KEY
        sync: false
      - key: FLW_WEBHOOK_HASH
        sync: false
      # --- Email (optional; leave SMTP_HOST empty to disable) ---
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false
      # APP_URL is optional on Render: the app falls back to RENDER_EXTERNAL_URL
      # automatically. Set it only when you attach a custom domain.
      # - key: APP_URL
      #   value: https://yourdomain.com
