services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    # Not exposed to the host by default; the app reaches it on the internal network.

  app:
    build: .
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/prointeractive
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env (32+ random characters)}
      JWT_EXPIRES_IN: 7d
      CORS_ORIGIN: ${CORS_ORIGIN:-}
      AWS_REGION: ${AWS_REGION:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      S3_BUCKET: ${S3_BUCKET:-}
      APP_URL: ${APP_URL:-}
      FLW_SECRET_KEY: ${FLW_SECRET_KEY:-}
      FLW_WEBHOOK_HASH: ${FLW_WEBHOOK_HASH:-}
      PLATFORM_FEE_PERCENT: ${PLATFORM_FEE_PERCENT:-5}
    depends_on:
      - mongo

volumes:
  mongo_data:
